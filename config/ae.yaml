# RUNTIME ==========
seed: 42


# MODEL ==========
model:
  name: 
  params:


# PIPELINE PACKAGE ==========
split:
  ratio:
    trn: 0.8
    val: 0.2
  shuffle: True

dataloader:
  batch_size: 128
  shuffle: True


# TRAINER PACKAGE ==========
num_epochs: 100

early_stopping:
  patience: 5
  delta: 0.0001
  warmup: 10

criterion:
  name: mse
  params:

optimizer:
  name: adamw
  params:
    lr: 0.001
    weight_decay: 0.001